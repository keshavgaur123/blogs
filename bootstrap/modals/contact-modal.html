<title>Contact Modal with AJAX</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<link rel="stylesheet" href="style.css">


<!-- </head>

<body> -->



<div class="modal fade" id="contactModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Modal Header -->
            <div class="modal-header">
                <h5 class="modal-title ">Contact Us</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Modal Body -->
            <div class="modal-body">

                <!-- Alert Messages -->
                <div id="formAlert"></div>

                <form id="contactForm">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="contact_name" placeholder="Enter your name">
                        <div class="text-danger mt-1 d-none" id="nameError">Please enter your name.</div>
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="contact_title" placeholder="Enter a title">
                        <div class="text-danger mt-1 d-none" id="titleError">Please enter a title.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="contact_description" rows="4"
                            placeholder="Write your message"></textarea>
                        <div class="text-danger mt-1 d-none" id="descError">Please enter a description.</div>
                    </div>

                    <button type="submit" class="btn btn-primary justify-content-center btn-sm w-100">Send Message</button>
                </form>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>




<script>
    $(document).ready(function () {
        $('#contactForm').submit(function (e) {
            e.preventDefault(); // Prevent page reload

            // Clear previous errors
            $('#nameError, #titleError, #descError').addClass('d-none');
            $('#formAlert').html('');

            // Get field values
            let name = $('#contact_name').val().trim();
            let title = $('#contact_title').val().trim();
            let description = $('#contact_description').val().trim();

            let valid = true;
            if (name === "") { $('#nameError').removeClass('d-none'); valid = false; }
            if (title === "") { $('#titleError').removeClass('d-none'); valid = false; }
            if (description === "") { $('#descError').removeClass('d-none'); valid = false; }
            if (!valid) return;

            //page not reloading
            let ajaxUrl = "/dev/witds/practicaltask/myblog/bootstrap/modals/submit_contact.php";

            $.ajax({
                url: ajaxUrl,
                type: 'POST',
                data: { name, title, description },
                dataType: 'json',
                beforeSend: function () {
                    $('#contactForm button[type="submit"]').prop('disabled', true).text('Sending...');
                },
                success: function (response) {
                    console.log(response);

                    if (response.status === 'success') {
                        $('#formAlert').html('<div class="alert alert-success">Message sent successfully!</div>');
                        $('#contactForm')[0].reset();

                        setTimeout(() => {
                            let modal = bootstrap.Modal.getInstance(document.getElementById('contactModal'));
                            modal.hide();

                            window.location.href = "/dev/witds/practicaltask/myblog/index.php";
                        }, 2000);
                    } else {
                        $('#formAlert').html('<div class="alert alert-danger">' + response.message + '</div>');
                    }
                },
                error: function (xhr) {
                    console.log(xhr.responseText);
                    $('#formAlert').html('<div class="alert alert-danger">Server error. Check console.</div>');
                },
                complete: function () {
                    $('#contactForm button[type="submit"]').prop('disabled', false).text('Send Message');
                }
            });

        });
    });
</script>
